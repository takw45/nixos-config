"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

format = """
$directory$git_branch$git_status\
$aws$bun$c$cpp$cmake$deno$docker_context$gradle$java$kotlin$nix_shell$nodejs$ruby$rust
$username$os$hostname $character
"""

right_format = """
$cmd_duration
"""

palette = "midnight_cat"

[palettes.midnight_cat]
bg = "#25252d"
fg = "#e6e9ef"
blue = "#89b4fa"
purple = "#c4b5fd"
green = "#8bd5a0"
orange = "#f5a97f"
red = "#f38ba8"
cyan = "#94e2d5"
gray = "#7b8092"
yellow = "#f0e79c"

[character]
success_symbol = "[ÔØ»](green)"
error_symbol = "[ÔØ»](red)"

[directory]
style = "yellow bold"
read_only = " ¾░î¥"

[git_branch]
symbol = "´Éİ "
style = "blue bold"

[git_commit]
tag_symbol = ' ´ÉÆ '

[git_status]
style = "red"

[username]
style_root = "bold red"
style_user = "bold cyan"
show_always = true

[os]
disabled = false

[hostname]
format = '[$ssh_symbol](bold blue)[$hostname](bold purple)'
ssh_only = false
ssh_symbol = "¯¼ü "

[cmd_duration]
format = '\[took [$duration]($style) \]'

